apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: unisab-microserv
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: unisab-microserv
  template:
    metadata:
      labels:
        app: unisab-microserv
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}