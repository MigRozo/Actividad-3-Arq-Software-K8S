name: CI/CD Pipeline Unisabana
on:
  push:
    branches: [ main ]
permissions:
  contents: write
jobs:
  build-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Build Docker Image
        run: |
          docker build -t unisabana-microservicio:${{ github.sha }} .

      - name: Trigger ArgoCD Sync
        run: |
          echo "# Last Deploy: $(date)" >> my-helm-chart/values.yaml
          git config --global user.name "Github Actions Bot"
          git config --global user.email "actions@github.com"
          git add my-helm-chart/values.yaml
          git commit -m "Automated triggrer: New Commit detected [skip ci]"
          git push